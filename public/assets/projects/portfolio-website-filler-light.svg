<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Portfolio Website Placeholder</title>
  <desc id="desc">Light filler image with soft gradients and decorative shapes.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7fafc" />
      <stop offset="100%" stop-color="#e7eef5" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7fb3d5" />
      <stop offset="100%" stop-color="#9fd3c7" />
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#7a8a99" flood-opacity="0.2" />
    </filter>
  </defs>

  <rect width="1200" height="720" fill="url(#bg)" />

  <circle cx="140" cy="90" r="120" fill="#dce8f2" opacity="0.6" />
