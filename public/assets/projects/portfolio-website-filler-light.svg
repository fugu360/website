    <rect x="170" y="145" width="860" height="74" rx="26" fill="#f1f5f9" />
  </g>

  <circle cx="215" cy="182" r="8" fill="#c8d4df" />
  <circle cx="243" cy="182" r="8" fill="#c8d4df" />
  <circle cx="271" cy="182" r="8" fill="#c8d4df" />

